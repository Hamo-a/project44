<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="assets/css/all.css">
    <!-- Custom css -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="register-page">
    <section class="section-form">
        <div class="welcome-box">
            <!-- Main Title -->
            <h2>Hello, <span id="welcomeWord">Welcome</span></h2>
            <!-- Sub Text -->
            <p id="welcomeText">
                Don you have an account?
            </p>
            <!-- Register Button -->
            <a href="login.html">
                <button class="welcome-btn" id="welcomeBtn">
                    Login
                    <span class="arrow" id="arrow">
                        <i class="fa-solid fa-arrow-right"></i>
                    </span>
                </button>
            </a>
        </div>
        <!-- Form -->
        <form id="registerForm" class="register-form">
            <h2>Create Account</h2>
            <!-- Names -->
            <div class="names">
                <div class="input-group">
                    <label for="firstName">First Name :</label>
                    <input type="text" placeholder="Enter first name" id="firstName">
                </div>
                <div class="input-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" placeholder="Enter last name" id="lastName">
                </div>
            </div>
            <!-- Email -->
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" placeholder="Enter email" id="email">
            </div>
            <!-- Password -->
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" placeholder="Enter password" id="password">
            </div>
            <button type="submit" class="register-btn" id="sign_up">Register</button>
            <p>
                Already have account?
                <a href="login.html">Login</a>
            </p>
        </form>
    </section>
    <!-- Registerjs -->
    <script src="assets/js/register.js"></script>
</body>

</html>
